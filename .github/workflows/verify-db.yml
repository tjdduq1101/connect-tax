name: DB 오염 데이터 자동 검증

on:
  schedule:
    - cron: '0 15 * * *'  # KST 자정 (UTC 15:00) — 이후 1000건씩 8회 연속 실행
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 1000건 × 8회 ≈ 40분 예상, 여유 포함

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: DB 오염 검증 실행 (1000건 × 8회 연속)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
        run: |
          for i in 1 2 3 4 5 6 7 8; do
            echo ""
            echo "═══════ 회차 $i / 8 ═══════"
            node scripts/verify-db.mjs || echo "⚠️ 회차 $i 실패 — 다음 회차 계속"
          done
